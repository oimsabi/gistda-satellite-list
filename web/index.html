<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GISTDA Satellite Price List — ราคาข้อมูลดาวเทียม</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app" id="app">
  <header class="app-header">
    <div class="title-block">
      <h1>ราคาข้อมูลดาวเทียม GISTDA</h1>
      <p class="subtitle">GISTDA Satellite Imagery Price List</p>
    </div>
    <div class="header-actions">
      <label class="vat-toggle" title="แสดงราคารวมภาษีมูลค่าเพิ่ม 7% / Show prices incl. 7% VAT">
        <input type="checkbox" id="vatToggle">
        <span>รวม VAT 7% · incl. VAT</span>
      </label>
      <button id="themeToggle" class="theme-btn" title="สลับโหมดสว่าง/มืด · Toggle light/dark">◐</button>
      <div class="downloads">
        <a href="../data/gistda_price_list.json" download>JSON</a>
        <a href="../data/csv/all.csv" download>CSV</a>
      </div>
    </div>
  </header>

  <nav class="tabs" id="tabs" role="tablist"></nav>

  <section class="filter-bar" id="filterBar">
    <input type="search" id="fSearch" placeholder="ค้นหาดาวเทียม / โหมด · Search satellite / mode">
    <select id="fSatellite" title="ดาวเทียม · Satellite"></select>
    <div class="range-pair" title="รายละเอียดภาพ (เมตร) · Resolution (m)">
      <span class="range-label">Res. (m)</span>
      <input type="number" id="fResMin" placeholder="min" min="0" step="any">
      <span>–</span>
      <input type="number" id="fResMax" placeholder="max" min="0" step="any">
    </div>
    <input type="number" id="fPriceMax" placeholder="ราคาสูงสุด · Max price (฿)" min="0">
    <button id="fReset" class="reset-btn">ล้างตัวกรอง · Reset</button>
    <span class="result-count" id="resultCount"></span>
  </section>

  <section class="category-notes" id="categoryNotes"></section>

  <section class="table-wrap">
    <table class="price-table" id="priceTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </section>

  <section class="chart-section">
    <div class="chart-header">
      <h2 id="chartTitle">เปรียบเทียบราคา · Price comparison</h2>
      <div class="unit-chips" id="unitChips"></div>
    </div>
    <div class="chart-legend" id="chartLegend"></div>
    <div class="chart-scroll">
      <svg id="chart" role="img" aria-label="Price comparison bar chart"></svg>
    </div>
    <div class="chart-tooltip" id="chartTooltip" hidden></div>
  </section>

  <footer class="app-footer" id="footer"></footer>
</div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
