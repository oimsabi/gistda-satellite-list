<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thailand Satellite Viewer — Earth Engine indices</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, "Segoe UI", sans-serif; }
  #map { height: 100%; }
  .coord-box {
    background: rgba(255,255,255,.92); padding: 5px 10px; border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,.3); font: 12.5px/1.5 ui-monospace, Consolas, monospace;
    color: #1a1a1a; min-width: 190px;
  }
  .coord-box .hint { color: #666; font-family: system-ui, sans-serif; font-size: 11px; }
  .leaflet-popup-content { font: 13px/1.6 ui-monospace, Consolas, monospace; }
  .leaflet-popup-content .ttl { font-family: system-ui, sans-serif; font-weight: 600; margin-bottom: 2px; }

  .panel { position: absolute; z-index: 1000; background: rgba(255,255,255,.95);
    border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.25); }
  /* tab bar */
  #tabbar { top: 10px; left: 52px; display: flex; flex-wrap: wrap; gap: 4px;
    padding: 6px; max-width: calc(100% - 320px); }
  #tabbar .grp { display: flex; gap: 4px; align-items: center; }
  #tabbar .grp-label { font: 10px/1 system-ui; color: #888; text-transform: uppercase;
    letter-spacing: .04em; padding: 0 2px; }
  #tabbar button { font: 12px system-ui; padding: 5px 10px; border: 1px solid #ccc;
    border-radius: 6px; background: #f5f5f5; cursor: pointer; color: #222; white-space: nowrap; }
  #tabbar button:hover:not(:disabled) { border-color: #1565c0; }
  #tabbar button.active { background: #1565c0; color: #fff; border-color: #1565c0; }
  #tabbar button:disabled { opacity: .45; cursor: not-allowed; }
  /* info + legend panel */
  #infopanel { top: 10px; right: 10px; width: 288px; padding: 13px 15px;
    font: 12.5px/1.55 system-ui, "Segoe UI", sans-serif; color: #1a1a1a; }
  #infopanel h3 { margin: 0 0 3px; font-size: 14.5px; }
  #infopanel .sub { color: #1565c0; font-weight: 600; font-size: 11.5px; margin-bottom: 6px; }
  #infopanel .desc { margin: 0 0 8px; }
  #infopanel .formula { font-family: ui-monospace, Consolas, monospace; background: #eef;
    padding: 1px 5px; border-radius: 3px; font-size: 11.5px; }
  #infopanel .meta { color: #555; font-size: 11px; border-top: 1px solid #eee;
    padding-top: 7px; margin-top: 7px; }
  #infopanel .meta div { margin: 1px 0; }
  #infopanel .stub-note { color: #b85450; font-size: 11.5px; }
  .legend-bar { height: 13px; border-radius: 3px; margin: 9px 0 3px; border: 1px solid rgba(0,0,0,.1); }
  .legend-scale { display: flex; justify-content: space-between; font-size: 11px; color: #444; }
  .legend-unit { text-align: center; font-size: 11px; color: #666; margin-top: 2px; }
  .opacity-row { display: flex; align-items: center; gap: 7px; margin-top: 10px;
    font-size: 11.5px; color: #444; }
  .opacity-row input { flex: 1; }
</style>
</head>

    activeRaster = L.tileLayer(layer.url, {
      maxZoom: 21, opacity: rasterOpacity,
      attribution: layer.attribution || "Google Earth Engine",
    }).addTo(map);
  }
  renderTabs();
  renderInfo(layer);
}

function renderTabs() {
  const bar = document.getElementById("tabbar");
  bar.innerHTML = "";
  let curGroup = null, groupEl = null;
  LAYERS.forEach((l) => {
    if (l.group !== curGroup) {
      curGroup = l.group;
      groupEl = document.createElement("div");
      groupEl.className = "grp";
      const lab = document.createElement("span");
      lab.className = "grp-label";
      lab.textContent = l.group;
      groupEl.appendChild(lab);
      bar.appendChild(groupEl);
    }
    const b = document.createElement("button");
    b.textContent = l.label;
    b.disabled = !l.enabled;
    if (l.key === activeKey) b.classList.add("active");
    if (!l.enabled) b.title = "Coming soon — " + (l.description || "");
    b.onclick = () => selectLayer(l.key);
    groupEl.appendChild(b);
  });
}

function renderInfo(layer) {
  const p = document.getElementById("infopanel");
  if (!layer) { p.innerHTML = ""; return; }
  let html = `<h3>${layer.label}</h3>`;
  if (layer.sub) html += `<div class="sub">${layer.sub}</div>`;
  if (layer.description) html += `<p class="desc">${layer.description}</p>`;
  if (layer.formula) html += `<p class="desc">Formula: <span class="formula">${layer.formula}</span></p>`;

  if (!layer.enabled) {
    html += `<p class="stub-note">⏳ Not yet available — ${layer.stubReason || "pending data source"}.</p>`;
  } else if (layer.legend) {
    const stops = layer.legend.palette.join(", ");
    html += `<div class="legend-bar" style="background:linear-gradient(to right, ${stops})"></div>`;
    html += `<div class="legend-scale"><span>${layer.legend.min}</span><span>${layer.legend.max}</span></div>`;
    if (layer.legend.unit) html += `<div class="legend-unit">${layer.legend.unit}</div>`;
  } else {
    html += `<div class="legend-unit">True-colour RGB composite</div>`;
  }

  const meta = [];
  if (layer.dataset) meta.push(`<div><b>Dataset:</b> ${layer.dataset}</div>`);
  if (layer.resolution) meta.push(`<div><b>Resolution:</b> ${layer.resolution}</div>`);
  if (layer.date) meta.push(`<div><b>Composite:</b> ${layer.date}</div>`);
  if (layer.source) meta.push(`<div>${layer.source}</div>`);
  if (meta.length) html += `<div class="meta">${meta.join("")}</div>`;

  if (layer.enabled && layer.url) {
    html += `<div class="opacity-row"><span>Opacity</span>` +
      `<input type="range" min="0" max="100" value="${Math.round(rasterOpacity * 100)}" id="opacitySlider">` +
      `<span id="opacityVal">${Math.round(rasterOpacity * 100)}%</span></div>`;
  }
  p.innerHTML = html;

  const sl = document.getElementById("opacitySlider");
  if (sl) sl.addEventListener("input", (e) => {
    rasterOpacity = e.target.value / 100;
    document.getElementById("opacityVal").textContent = e.target.value + "%";
    if (activeRaster) activeRaster.setOpacity(rasterOpacity);
  });
}

/* initial paint: first enabled layer, or just the tab bar if none generated yet */
renderTabs();
const firstEnabled = LAYERS.find((l) => l.enabled);
if (firstEnabled) selectLayer(firstEnabled.key);

/* click → precise location popup */
map.on("click", (e) => {
  const { lat, lng } = e.latlng;
  const dms = (v, pos, neg) => {
    const d = Math.abs(v), deg = Math.floor(d), m = Math.floor((d - deg) * 60),
          s = ((d - deg) * 60 - m) * 60;
    return `${deg}\u00b0${String(m).padStart(2, "0")}'${s.toFixed(2)}"${v >= 0 ? pos : neg}`;
  };
  L.popup()
    .setLatLng(e.latlng)
    .setContent(
      `<div class="ttl">Location</div>` +
      `Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}<br>` +
      `${dms(lat, "N", "S")} ${dms(lng, "E", "W")}<br>` +
      `<a href="https://www.google.com/maps?q=${lat.toFixed(6)},${lng.toFixed(6)}" target="_blank" rel="noopener">Open in Google Maps</a>`
    )
    .openOn(map);
});

/* live mouse coordinate readout (bottom-left) */
const coordCtl = L.control({ position: "bottomleft" });
coordCtl.onAdd = () => {
  const div = L.DomUtil.create("div", "coord-box");
  div.innerHTML = '<span class="hint">Move mouse over map \u00b7 click for details</span>';
  map.on("mousemove", (e) => {
    div.innerHTML = `Lat ${e.latlng.lat.toFixed(6)}&nbsp;&nbsp;Lng ${e.latlng.lng.toFixed(6)}`;
  });
  return div;
};
coordCtl.addTo(map);

L.control.scale({ metric: true, imperial: false }).addTo(map);
</script>
</body>
</html>
